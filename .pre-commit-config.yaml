repos:
  # --- General File Cleanup ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # Removes any extra spaces at the end of lines
      - id: trailing-whitespace
      # Ensures every file ends with a single blank line
      - id: end-of-file-fixer
      # Verifies that YAML files are syntactically correct
      - id: check-yaml
      # Prevents you from accidentally committing very large files
      - id: check-added-large-files
      # Checks for files that would conflict on case-insensitive filesystems
      - id: check-case-conflict
      # Checks for merge conflict markers
      - id: check-merge-conflict

  # --- Code Formatting ---
  - repo: https://github.com/psf/black
    rev: 24.1.1
    hooks:
      # Automatically reformats Python code to follow a strict style guide
      - id: black

  # --- Import Sorting ---
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      # Automatically sorts and groups Python imports alphabetically
      - id: isort

  # --- Style & Logic Linting ---
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      # Checks for PEP 8 styling issues and common coding errors
      - id: flake8

  # --- Security Scanning ---
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.7
    hooks:
      # Scans code for common security vulnerabilities (e.g., hardcoded passwords)
      - id: bandit
        args: ["-iii", "-ll"]

  # ===========================================================
  # --- OCA Odoo-Specific Hooks ---
  # ===========================================================

  # --- OCA Pre-commit Hooks (XML, CSV, Manifest checks) ---
  - repo: https://github.com/OCA/odoo-pre-commit-hooks
    rev: v0.2.20
    hooks:
      # Checks for py, csv, and xml files of Odoo modules
      - id: oca-checks-odoo-module
      # Checks for .po/.pot translation files
      - id: oca-checks-po
        args: ["--disable=po-pretty-format"]

  # --- Pylint with Odoo Plugin (Odoo-specific Python linting) ---
  - repo: https://github.com/OCA/pylint-odoo
    rev: v10.0.0
    hooks:
      - id: pylint_odoo
        args:
          - --rcfile=.pylintrc
