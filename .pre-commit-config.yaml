default_language_version:
  python: python3
  node: "22.9.0"

exclude: |
  (?x)
  # NOT INSTALLABLE ADDONS
  # END NOT INSTALLABLE ADDONS
  ^setup/|/static/description/index\.html$|
  .svg$|/tests/([^/]+/)?cassettes/|^.copier-answers.yml$|^.github/|^eslint.config.cjs|^prettier.config.cjs|
  ^README\.md$|
  /static/(src/)?lib/|
  ^docs/_templates/.*\.html$|
  readme/.*\.(rst|md)$|
  /build/|/dist/|
  /tests/samples/.*|
  (LICENSE.*|COPYING.*)

repos:
  # ─────────────────────────────────────────
  # SAFETY HOOKS — block dangerous commits
  # ─────────────────────────────────────────
  - repo: local
    hooks:
      - id: forbidden-files
        name: forbidden files
        entry: found forbidden files; remove them
        language: fail
        files: "\\.rej$"

      - id: en-po-files
        name: en.po files cannot exist
        entry: found a en.po file
        language: fail
        files: '[a-zA-Z0-9_]*/i18n/en\.po$'

  # ─────────────────────────────────────────
  # PACKAGING
  # ─────────────────────────────────────────
  - repo: https://github.com/sbidoul/whool
    rev: v1.3
    hooks:
      - id: whool-init

  # ─────────────────────────────────────────
  # ODOO SPECIFIC
  # ─────────────────────────────────────────
  - repo: https://github.com/oca/maintainer-tools
    rev: b89f767503be6ab2b11e4f50a7557cb20066e667
    hooks:
      - id: oca-update-pre-commit-excluded-addons

      - id: oca-gen-addon-readme
        args:
          - --addons-dir=.
          - --branch=18.0
          - --org-name=OCA
          - --repo-name=python-precommit-demo
          - --if-source-changed
          - --keep-source-digest
          - --convert-fragments-to-markdown

      - id: oca-gen-external-dependencies

  - repo: https://github.com/OCA/odoo-pre-commit-hooks
    rev: v0.2.20
    hooks:
      - id: oca-checks-po

  # ─────────────────────────────────────────
  # CODE FORMATTING — auto-fixes style
  # ─────────────────────────────────────────
  - repo: local
    hooks:
      - id: prettier
        name: prettier (with plugin-xml)
        entry: prettier
        args:
          - --write
          - --list-different
          - --ignore-unknown
        types: [text]
        files: \.(css|htm|html|js|json|jsx|less|md|scss|toml|ts|xml|yaml|yml)$
        language: node
        additional_dependencies:
          - "prettier@3.3.3"
          - "@prettier/plugin-xml@3.4.1"

      - id: eslint
        name: eslint
        entry: eslint
        args:
          - --color
          - --fix
        verbose: true
        types: [javascript]
        language: node
        additional_dependencies:
          - "eslint@9.12.0"
          - "@eslint/js@9.12.0"
          - "eslint-plugin-jsdoc@50.3.1"
          - "globals@16.0.0"

  # ─────────────────────────────────────────
  # FILE SAFETY — catches common mistakes
  # ─────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: /README\.rst$|\.pot?$

      - id: end-of-file-fixer
        exclude: /README\.rst$|\.pot?$

      - id: debug-statements

      - id: fix-encoding-pragma
        args: ["--remove"]

      - id: check-case-conflict

      - id: check-docstring-first

      - id: check-merge-conflict
        exclude: /README\.rst$|^docs/.*\.rst$

      - id: check-symlinks

      - id: check-xml

  # ─────────────────────────────────────────
  # PYTHON QUALITY — linting + formatting
  # ─────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.8
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]

      - id: ruff-format

  # ─────────────────────────────────────────
  # ODOO PYTHON QUALITY — runs twice
  # ─────────────────────────────────────────
  - repo: https://github.com/OCA/pylint-odoo
    rev: v10.0.0
    hooks:
      - id: pylint_odoo
        name: pylint with optional checks
        args:
          - --rcfile=.pylintrc
          - --exit-zero
        verbose: true

      - id: pylint_odoo
        args:
          - --rcfile=.pylintrc
