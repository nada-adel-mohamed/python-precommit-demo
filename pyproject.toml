[tool.ruff]
target-version = "py312"
line-length = 88
exclude = [
    "__init__.py",
]

[tool.ruff.lint]
select = [
    "F",   # Pyflakes
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "S",   # flake8-bandit
]
ignore = [
    "B018", # useless expression (common in Odoo manifests)
    "S603", # subprocess call: check for execution of untrusted input
    "S607", # start-process-with-partial-path (not easy to avoid on Windows)
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
